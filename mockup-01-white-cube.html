<html lang="ko">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #444444;
      --caption-meta: #8a8a8a;
      --year-nav-idle: #d4d4d4;
      --caption-meta-size: 0.78rem;
      --line: #e8e8e8;
      --max: 1120px;
      /* 로고 · 연도 필터 · 섹션 연도 동일 */
      --year-size: clamp(1.5rem, 3.8vw, 1.75rem);
      /* 캡션 한 덩어리 (제목·매체·크기·연도 동일 크기) */
      --cap-size: 0.95rem;
      /* 연도(#y2024 등) 앵커 시 스티키 GNB 아래로 여유 두기 */
      --year-anchor-offset: clamp(7.5rem, 11vh + 4rem, 11rem);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }
    a.logo:hover { text-decoration: none; }

    /* 스티키: GNB + 연도 한 덩어리 */
    .masthead {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }
    .masthead__top {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1rem 1.5rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      font-size: var(--year-size);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-transform: lowercase;
    }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      font-size: var(--cap-size);
      font-weight: 600;
      letter-spacing: 0;
      text-transform: lowercase;
    }
    .nav a[aria-current="page"] {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 2px;
    }
    .nav-ig {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      color: var(--fg);
    }
    .nav-ig:hover {
      text-decoration: none;
      opacity: 0.55;
    }
    .nav-ig svg {
      width: 22px;
      height: 22px;
    }
    button.nav-mail {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      color: var(--fg);
      font: inherit;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    button.nav-mail:hover {
      text-decoration: none;
      opacity: 0.55;
    }
    button.nav-mail svg {
      width: 22px;
      height: 22px;
    }
    .masthead__years {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 1.5rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.35rem;
      align-items: baseline;
    }
    .masthead__years a {
      font-size: var(--year-size);
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--year-nav-idle);
      text-decoration: none;
      line-height: 1.1;
    }
    .masthead__years a:hover {
      color: var(--fg);
    }
    .masthead__years a.is-active {
      color: var(--fg);
    }

    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .year-section {
      scroll-margin-top: var(--year-anchor-offset);
    }

    .year-section + .year-section {
      margin-top: 5rem;
      padding-top: 0.25rem;
    }

    .year-heading {
      font-size: var(--year-size);
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 1.75rem;
      margin-top: 0;
      padding-top: 0.35rem;
      line-height: 1.15;
    }

    .year-section .work-grid:last-child {
      margin-bottom: 0.5rem;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2.25rem 1.5rem;
    }
    .work-card__frame {
      background: #f4f4f4;
      overflow: hidden;
    }
    .work-card__frame--portrait { aspect-ratio: 3 / 4; }
    .work-card__frame--square { aspect-ratio: 1 / 1; }
    .work-card__frame--landscape { aspect-ratio: 5 / 4; }
    .work-card__frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .work-card figcaption {
      margin-top: 0.65rem;
      line-height: 1.45;
    }
    .work-card .title {
      display: block;
      margin-bottom: 0.35rem;
      font-size: var(--cap-size);
      font-weight: 600;
      color: var(--fg);
    }
    .work-card .meta-line {
      display: block;
      font-size: var(--caption-meta-size);
      font-weight: 500;
      color: var(--caption-meta);
    }

    .work-card {
      cursor: pointer;
    }
    .work-card:focus {
      outline: none;
    }
    .work-card:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 4px;
    }

    /* 라이트박스 */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 4.5rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }
    .lightbox.is-open {
      opacity: 1;
      visibility: visible;
    }
    .lightbox__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      cursor: pointer;
    }
    .lightbox__inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: min(92vw, 1100px);
      max-height: calc(100vh - 6rem);
      pointer-events: none;
    }
    .lightbox__inner img {
      pointer-events: auto;
      max-width: 100%;
      max-height: calc(100vh - 11rem);
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .lightbox__caption {
      margin-top: 1.25rem;
      text-align: center;
      max-width: 36rem;
      pointer-events: none;
    }
    .lightbox__caption .title {
      display: block;
      font-size: var(--cap-size);
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 0.35rem;
    }
    .lightbox__caption .meta-line {
      display: block;
      font-size: var(--caption-meta-size);
      font-weight: 500;
      color: var(--caption-meta);
    }
    .lightbox__btn {
      pointer-events: auto;
      position: absolute;
      z-index: 2;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .lightbox__btn:hover {
      background: #fff;
      border-color: #ccc;
    }
    .lightbox__btn:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .lightbox__prev { left: max(1rem, env(safe-area-inset-left)); }
    .lightbox__next { right: max(1rem, env(safe-area-inset-right)); }
    .lightbox__btn svg {
      width: 20px;
      height: 20px;
    }
    body.lightbox-open {
      overflow: hidden;
    }
    @media (max-width: 640px) {
      .lightbox {
        padding: 3.5rem 0.75rem;
      }
      .lightbox__btn {
        width: 38px;
        height: 38px;
      }
      .lightbox__prev { left: 0.35rem; }
      .lightbox__next { right: 0.35rem; }
    }

  </style>
</head>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="작품 크게 보기" hidden>
    <div class="lightbox__backdrop" data-close-lightbox></div>
    <button type="button" class="lightbox__btn lightbox__prev" aria-label="이전 작품">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button type="button" class="lightbox__btn lightbox__next" aria-label="다음 작품">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lightbox__inner">
      <img class="lightbox__img" alt="" />
      <div class="lightbox__caption"></div>
    </div>
  </div>

  <script>
    (function () {
      document.querySelectorAll("img[data-fallback]").forEach(function (img) {
        var fb = img.getAttribute("data-fallback");
        if (!fb) return;
        img.addEventListener("error", function once() {
          img.removeEventListener("error", once);
          img.src = fb;
        });
      });

      var masthead = document.querySelector(".masthead");
      var yearLinks = document.querySelectorAll(".masthead__years a");
      var sections = document.querySelectorAll(".year-section");

      function updateYearNav() {
        if (!masthead || !sections.length) return;
        var y = window.scrollY + masthead.getBoundingClientRect().height + 8;
        var currentId = sections[0].id;
        for (var i = sections.length - 1; i >= 0; i--) {
          var top = sections[i].offsetTop;
          if (top <= y) {
            currentId = sections[i].id;
            break;
          }
        }
        yearLinks.forEach(function (a) {
          var hash = a.getAttribute("href").slice(1);
          a.classList.toggle("is-active", hash === currentId);
        });
      }

      window.addEventListener("scroll", updateYearNav, { passive: true });
      window.addEventListener("resize", updateYearNav);
      updateYearNav();

      var STUDIO_EMAIL = "woni.cha@gmail.com";
      document.querySelectorAll(".nav-mail").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var label = btn.getAttribute("aria-label");
          function done() {
            btn.setAttribute("aria-label", "복사됨: " + STUDIO_EMAIL);
            setTimeout(function () {
              btn.setAttribute("aria-label", label);
            }, 2000);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(STUDIO_EMAIL).then(done).catch(fallback);
          } else {
            fallback();
          }
          function fallback() {
            var ta = document.createElement("textarea");
            ta.value = STUDIO_EMAIL;
            ta.setAttribute("readonly", "");
            ta.style.cssText = "position:fixed;left:-9999px;top:0";
            document.body.appendChild(ta);
            ta.select();
            try {
              if (document.execCommand("copy")) done();
            } catch (e) {}
            document.body.removeChild(ta);
          }
        });
      });

      /* 라이트박스 갤러리 */
      var lb = document.getElementById("lightbox");
      var lbImg = lb.querySelector(".lightbox__img");
      var lbCap = lb.querySelector(".lightbox__caption");
      var lbPrev = lb.querySelector(".lightbox__prev");
      var lbNext = lb.querySelector(".lightbox__next");
      var cards = Array.prototype.slice.call(document.querySelectorAll("figure.work-card")).filter(function (fig) {
        return fig.querySelector("img");
      });
      var items = cards.map(function (fig) {
        return { fig: fig };
      });
      var lbIdx = 0;

      function captionHTML(fig) {
        var title = fig.querySelector(".title");
        var lines = fig.querySelectorAll(".meta-line");
        var html = "";
        if (title) html += '<span class="title">' + title.textContent + "</span>";
        lines.forEach(function (line) {
          html += '<span class="meta-line">' + line.textContent + "</span>";
        });
        return html;
      }

      function openLightbox(index) {
        if (!items.length) return;
        lbIdx = (index + items.length) % items.length;
        var item = items[lbIdx];
        var imgEl = item.fig.querySelector("img");
        lbImg.src = imgEl.currentSrc || imgEl.src;
        lbImg.alt = imgEl.getAttribute("alt") || "";
        lbCap.innerHTML = captionHTML(item.fig);
        lb.hidden = false;
        lb.classList.add("is-open");
        document.body.classList.add("lightbox-open");
        lbPrev.focus();
      }

      function closeLightbox() {
        lb.classList.remove("is-open");
        document.body.classList.remove("lightbox-open");
        lb.hidden = true;
        lbImg.removeAttribute("src");
      }

      cards.forEach(function (fig, i) {
        fig.addEventListener("click", function () {
          openLightbox(i);
        });
        fig.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openLightbox(i);
          }
        });
        fig.setAttribute("tabindex", "0");
        fig.setAttribute("role", "button");
      });

      lbPrev.addEventListener("click", function (e) {
        e.stopPropagation();
        openLightbox(lbIdx - 1);
      });
      lbNext.addEventListener("click", function (e) {
        e.stopPropagation();
        openLightbox(lbIdx + 1);
      });
      lb.querySelectorAll("[data-close-lightbox]").forEach(function (el) {
        el.addEventListener("click", closeLightbox);
      });

      document.addEventListener("keydown", function (e) {
        if (!lb.classList.contains("is-open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") openLightbox(lbIdx - 1);
        if (e.key === "ArrowRight") openLightbox(lbIdx + 1);
      });

      lb.addEventListener("click", function (e) {
        if (e.target === lb) closeLightbox();
      });
    })();
  </script>
</body>
