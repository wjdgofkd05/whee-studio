<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whee Studio — 시안 1 · 2 · 3 미리보기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #eee;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .bar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      padding: 0.65rem 0.85rem;
      background: #252525;
      border-bottom: 1px solid #3a3a3a;
    }
    .bar .title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-right: 0.5rem;
      color: #ccc;
    }
    .bar button,
    .bar a.btn {
      font: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border: 1px solid #555;
      background: #333;
      color: #eee;
      cursor: pointer;
      text-decoration: none;
      border-radius: 2px;
    }
    .bar button:hover,
    .bar a.btn:hover {
      background: #444;
      border-color: #777;
    }
    .bar button.primary {
      background: #e8e8e8;
      color: #111;
      border-color: #e8e8e8;
    }
    .bar button.primary:hover {
      background: #fff;
    }
    .split {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
      min-height: 0;
    }
    /* 좁은 화면: 1·2 상단, 3 하단 전체 폭 */
    @media (max-width: 1399px) {
      .split {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: minmax(42vh, 1fr) minmax(42vh, 1fr);
      }
      .pane--bottom-span {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 700px) {
      .split {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, minmax(36vh, auto));
      }
      .pane--bottom-span {
        grid-column: auto;
      }
    }
    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid #3a3a3a;
    }
    .pane:last-child { border-right: none; }
    @media (max-width: 1399px) {
      .pane:nth-child(2) { border-right: none; }
    }
    @media (max-width: 700px) {
      .pane { border-right: none; border-bottom: 1px solid #3a3a3a; }
      .pane:last-child { border-bottom: none; }
    }
    .pane-label {
      flex-shrink: 0;
      padding: 0.35rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #2d2d2d;
      color: #aaa;
    }
    .pane iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="bar">
    <span class="title">시안 1 · 2 · 3</span>
    <button type="button" class="primary" id="openAll">셋 다 새 탭으로 열기</button>
    <a class="btn" href="mockup-01-white-cube.html" target="_blank" rel="noopener">시안 1</a>
    <a class="btn" href="mockup-02-editorial.html" target="_blank" rel="noopener">시안 2</a>
    <a class="btn" href="mockup-03-archive.html" target="_blank" rel="noopener">시안 3</a>
  </div>
  <div class="split">
    <div class="pane">
      <div class="pane-label">시안 1 · White Cube</div>
      <iframe title="시안 1" src="mockup-01-white-cube.html"></iframe>
    </div>
    <div class="pane">
      <div class="pane-label">시안 2 · Editorial</div>
      <iframe title="시안 2" src="mockup-02-editorial.html"></iframe>
    </div>
    <div class="pane pane--bottom-span">
      <div class="pane-label">시안 3 · Archive</div>
      <iframe title="시안 3" src="mockup-03-archive.html"></iframe>
    </div>
  </div>
  <script>
    document.getElementById("openAll").addEventListener("click", function () {
      window.open("mockup-01-white-cube.html", "_blank", "noopener");
      window.open("mockup-02-editorial.html", "_blank", "noopener");
      window.open("mockup-03-archive.html", "_blank", "noopener");
    });
  </script>
</body>
</html>
